<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aizen FE Key System</title>
<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 30% 20%,#4c1d95 0,#090512 38%,#020106 100%);font-family:Inter,Arial,sans-serif;color:#f8f7ff}.card{width:min(92vw,560px);padding:34px;border:1px solid #8b5cf655;border-radius:28px;background:#11091fcc;box-shadow:0 0 70px #7c3aed55;text-align:center;backdrop-filter:blur(18px)}h1{font-size:42px;margin:0 0 8px}.muted{color:#c4b5fd}.key{margin:24px 0;padding:18px;border-radius:16px;background:#05020d;border:1px solid #a855f777;font:800 24px JetBrains Mono,monospace;letter-spacing:.08em;color:#fff}button{border:0;border-radius:14px;padding:14px 22px;margin:6px;background:linear-gradient(135deg,#6d28d9,#d946ef);color:#fff;font-weight:900;cursor:pointer}small{display:block;margin-top:18px;color:#a78bfa}</style>
</head>
<body>
<main class="card">
<h1>YOKOSO</h1>
<p class="muted">Aizen FE secure access. Generate one of the approved keys, copy it, then paste it in the Roblox key gate.</p>
<div id="key" class="key">PRESS GENERATE</div>
<button onclick="gen()">GENERATE KEY</button>
<button onclick="copyKey()">COPY KEY</button>
<small>Keys rotate locally for simple access gating. Replace this page with a backend check if you need true security.</small>
</main>
<script>
const keys=["YOKOSO-AIZEN-01","KYOKA-GLASS-02","HADO90-COFFIN-03","REIATSU-KING-04","RAIKOHO-STORM-05","SHUNPO-BLUR-06","AIZEN-SOUL-07","GOTEI-VOID-08","BANKAI-NONE-09","ULTRA-AIZEN-10"];
function gen(){key.textContent=keys[Math.floor(Math.random()*keys.length)]}
function copyKey(){navigator.clipboard.writeText(key.textContent)}
gen();
</script>
</body>
</html>
