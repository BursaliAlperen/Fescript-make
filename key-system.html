<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aizen FE Access</title>
<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 30% 20%,#4c1d95 0,#090512 38%,#020106 100%);font-family:Inter,Arial,sans-serif;color:#f8f7ff}.card{width:min(92vw,700px);padding:34px;border:1px solid #8b5cf655;border-radius:28px;background:#11091fcc;box-shadow:0 0 70px #7c3aed55;text-align:center;backdrop-filter:blur(18px)}h1{font-size:42px;margin:0 0 8px}.muted{color:#c4b5fd}.key{margin:24px 0;padding:18px;border-radius:16px;background:#05020d;border:1px solid #a855f777;font:800 22px JetBrains Mono,monospace;letter-spacing:.06em;color:#fff;word-break:break-word}.steps{display:grid;gap:10px;margin:22px 0}.step{padding:12px;border:1px solid #ffffff14;border-radius:14px;background:#ffffff0a;color:#c4b5fd}.step.done{border-color:#34d39988;color:#34d399}.smart{margin:16px 0;padding:12px;border:1px solid #a855f744;border-radius:14px;background:#2e106511;color:#d8b4fe;font-size:13px;line-height:1.55}button,a.btn{border:0;border-radius:14px;padding:14px 22px;margin:6px;background:linear-gradient(135deg,#6d28d9,#d946ef);color:#fff;font-weight:900;cursor:pointer;text-decoration:none;display:inline-block}button:disabled{opacity:.45;cursor:not-allowed}small{display:block;margin-top:18px;color:#a78bfa}
</style>
</head>
<body>
<main class="card">
<h1 id="title">AIZEN KEY ACCESS</h1>
<p id="desc" class="muted">Complete every access step. Refreshing this page restarts the process.</p>
<div id="smart" class="smart"></div>
<div class="steps" id="steps"></div>
<button id="action">START STEP 1</button>
<div id="result" class="key" style="display:none"></div>
<button id="copy" style="display:none">COPY KEY</button>
<a id="scriptLink" class="btn" style="display:none" href="/aizen/script">OPEN SCRIPT ACCESS</a>
<small id="hint">Routes: /aizen/key1 through /aizen/key50. Each route keeps the same key for 10 minutes, then rotates to a new key.</small>
</main>
<script>
const keys=[
"KEY1-X7K2MP","KEY2-Q9L3NR","KEY3-W5T8VS","KEY4-R1Y6UB","KEY5-A8C4DW","KEY6-M3F9EJ","KEY7-P2H6KT","KEY8-Z4J7LM","KEY9-N5V1QR","KEY10-B8X3SW",
"KEY11-G2Y9TR","KEY12-K6M4UZ","KEY13-D1P5WA","KEY14-L7R2CV","KEY15-E3S8BX","KEY16-F9T1NY","KEY17-J4U6HD","KEY18-O2V5JG","KEY19-C6W3KQ","KEY20-T8Z7LP",
"KEY21-V1A5MR","KEY22-W4B8NS","KEY23-X9C2PT","KEY24-Y2D6QU","KEY25-Z7E3RV","KEY26-A3F5SW","KEY27-B6G8TX","KEY28-C1H4UY","KEY29-D5I7VZ","KEY30-E8J2WA",
"KEY31-F4K9XB","KEY32-G7L1YC","KEY33-H2M5ZD","KEY34-I6N8AE","KEY35-J3P2BF","KEY36-K9Q4CG","KEY37-L1R7DH","KEY38-M5S3EI","KEY39-N8T6FJ","KEY40-O2U9GK",
"KEY41-P6V1HL","KEY42-Q3W4IM","KEY43-R7X8JN","KEY44-S1Y5KO","KEY45-T4Z2LP","KEY46-U8A9MQ","KEY47-V2B3NR","KEY48-W6C7OS","KEY49-X9D1PT","KEY50-Y3E5QU"
];
const params=new URLSearchParams(location.search);
const path=location.pathname.toLowerCase();
const mode=path.includes('/script')?'script':'key';
const routeMatch=path.match(/\/key([1-9]|[1-4][0-9]|50)(?:\/|$)/);
const routeNumber=routeMatch?Number(routeMatch[1]):1;
const validSet=new Set(keys);
const requested=(params.get('key')||'').toUpperCase().replace(/\s+/g,'');
const submitted=(params.get('submitted')||'').toUpperCase().replace(/\s+/g,'');

const TEN_MINUTES_MS=10*60*1000;
const storagePrefix='aizen_key_route_';

function getRouteByKey(keyValue){
  const index=keys.indexOf(keyValue);
  return index===-1?null:index+1;
}

function isKnownKey(keyValue){
  return validSet.has(keyValue);
}


function randomKeyExcluding(exclude){
  if(keys.length===1){return keys[0];}
  let next=exclude;
  while(next===exclude){
    next=keys[Math.floor(Math.random()*keys.length)];
  }
  return next;
}

function getOrCreateRouteKey(route){
  const now=Date.now();
  const storageKey=`${storagePrefix}${route}`;
  const raw=localStorage.getItem(storageKey);
  if(raw){
    try{
      const cached=JSON.parse(raw);
      if(cached.value&&cached.expiresAt&&cached.expiresAt>now){
        return cached;
      }
      const newValue=randomKeyExcluding(cached.value||'');
      const updated={value:newValue,issuedAt:now,expiresAt:now+TEN_MINUTES_MS};
      localStorage.setItem(storageKey,JSON.stringify(updated));
      return updated;
    }catch{}
  }
  const created={value:keys[Math.floor(Math.random()*keys.length)],issuedAt:now,expiresAt:now+TEN_MINUTES_MS};
  localStorage.setItem(storageKey,JSON.stringify(created));
  return created;
}

const routeKeyData=getOrCreateRouteKey(routeNumber);
const exactKey=validSet.has(requested)?requested:routeKeyData.value;
const expiresInMinutes=Math.max(0,Math.ceil((routeKeyData.expiresAt-Date.now())/60000));
const submittedIsValid=isKnownKey(submitted);
const submittedRoute=submittedIsValid?getRouteByKey(submitted):null;

title.textContent=mode==='script'?'AIZEN SCRIPT ACCESS':`AIZEN KEY ${routeNumber} ACCESS`;
desc.textContent=mode==='script'
  ?'Pass the steps to reach script access. Refresh starts over.'
  :'Pass the steps to reveal your route key. Your route stays on the same key for 10 minutes, then rotates automatically.';
smart.innerHTML=mode==='script'
  ?`Smart scan: script access mode detected. ${submitted? (submittedIsValid?`Submitted key is recognized from <b>/aizen/key${submittedRoute}</b>.`:'Submitted key is not in the 50-key list.'):'Add ?submitted=YOUR_KEY in URL to verify a key instantly.'}`
  :`Smart scan: route <b>/aizen/key${routeNumber}</b> detected. ${validSet.has(requested)?'A valid URL key override was detected.':'This route key is locked for 10 minutes and survives refreshes/clicks in this browser.'} Time left: <b>${expiresInMinutes} minute(s)</b>.`;

const stepNames=['Wait 5 seconds','Confirm website visit','Scan requested key route','Final security check','Reveal exact key'];
let step=0,value='';
steps.innerHTML=stepNames.map((s,i)=>`<div class="step" id="s${i}">${i+1}. ${s}</div>`).join('');

function finish(){
  value=mode==='script'
    ?'SCRIPT ACCESS UNLOCKED — return to Roblox and paste any fresh website key.'
    :exactKey;
  result.textContent=value;
  result.style.display='block';
  copy.style.display='inline-block';
  if(mode==='key')scriptLink.style.display='inline-block';
  action.style.display='none';
}

function next(){
  if(step>0)document.getElementById('s'+(step-1)).classList.add('done');
  if(step>=stepNames.length){finish();return;}
  action.disabled=true;
  action.textContent='WAIT...';
  let left=step===0?5:2;
  const tick=setInterval(()=>{
    action.textContent=`${stepNames[step]} (${left}s)`;
    if(left--<=0){
      clearInterval(tick);
      action.disabled=false;
      action.textContent=step+1===stepNames.length?'FINISH':'CONTINUE';
      step++;
    }
  },1000);
}

action.onclick=next;
copy.onclick=()=>navigator.clipboard.writeText(value);
next();
</script>
</body>
</html>
