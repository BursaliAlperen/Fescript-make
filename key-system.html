<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aizen FE Access</title>
<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 30% 20%,#4c1d95 0,#090512 38%,#020106 100%);font-family:Inter,Arial,sans-serif;color:#f8f7ff}.card{width:min(92vw,590px);padding:34px;border:1px solid #8b5cf655;border-radius:28px;background:#11091fcc;box-shadow:0 0 70px #7c3aed55;text-align:center;backdrop-filter:blur(18px)}h1{font-size:42px;margin:0 0 8px}.muted{color:#c4b5fd}.key{margin:24px 0;padding:18px;border-radius:16px;background:#05020d;border:1px solid #a855f777;font:800 22px JetBrains Mono,monospace;letter-spacing:.06em;color:#fff;word-break:break-word}.steps{display:grid;gap:10px;margin:22px 0}.step{padding:12px;border:1px solid #ffffff14;border-radius:14px;background:#ffffff0a;color:#c4b5fd}.step.done{border-color:#34d39988;color:#34d399}button,a.btn{border:0;border-radius:14px;padding:14px 22px;margin:6px;background:linear-gradient(135deg,#6d28d9,#d946ef);color:#fff;font-weight:900;cursor:pointer;text-decoration:none;display:inline-block}button:disabled{opacity:.45;cursor:not-allowed}small{display:block;margin-top:18px;color:#a78bfa}</style>
</head>
<body>
<main class="card">
<h1 id="title">WELCOME</h1>
<p id="desc" class="muted">Complete every access step. Refreshing this page restarts the process.</p>
<div class="steps" id="steps"></div>
<button id="action">START STEP 1</button>
<div id="result" class="key" style="display:none"></div>
<button id="copy" style="display:none">COPY</button>
<a id="scriptLink" class="btn" style="display:none" href="/aizen/script">OPEN SCRIPT ACCESS</a>
<small id="hint">Key route: /aizen/key • Script route: /aizen/script</small>
</main>
<script>
const keys=["WELCOME-AIZEN-01","KYOKA-GLASS-02","HADO90-COFFIN-03","REIATSU-KING-04","RAIKOHO-STORM-05","SHUNPO-BLUR-06","AIZEN-SOUL-07","GOTEI-VOID-08","BANKAI-NONE-09","ULTRA-AIZEN-10"];
const mode=location.pathname.toLowerCase().includes('/script')?'script':'key';
const stepNames=['Wait 5 seconds','Confirm website visit','Generate access token','Final security check'];
let step=0,value='';
title.textContent=mode==='script'?'AIZEN SCRIPT ACCESS':'AIZEN KEY ACCESS';
desc.textContent=mode==='script'?'Pass the steps to reach the script access page. Refresh starts over.':'Pass the steps to generate an Aizen key. Refresh starts over.';
steps.innerHTML=stepNames.map((s,i)=>`<div class="step" id="s${i}">${i+1}. ${s}</div>`).join('');
function finish(){value=mode==='script'?'SCRIPT ACCESS UNLOCKED — paste a valid key in Roblox, then use the Aizen FE tools.':keys[Math.floor(Math.random()*keys.length)];result.textContent=value;result.style.display='block';copy.style.display='inline-block';if(mode==='key')scriptLink.style.display='inline-block';action.style.display='none'}
function next(){if(step>0)document.getElementById('s'+(step-1)).classList.add('done');if(step>=stepNames.length){finish();return}action.disabled=true;action.textContent='WAIT...';let left=step===0?5:2;const tick=setInterval(()=>{action.textContent=`${stepNames[step]} (${left}s)`;if(left--<=0){clearInterval(tick);action.disabled=false;action.textContent=step+1===stepNames.length?'FINISH':'CONTINUE';step++}},1000)}
action.onclick=next;copy.onclick=()=>navigator.clipboard.writeText(value);next();
</script>
</body>
</html>
